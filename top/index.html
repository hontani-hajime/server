<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 基本スタイル */
        .container {
            padding: 20px;
        }
        .todo-list, .notes {
            margin-top: 20px;
        }
        .todo-list input, .notes textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        .task-list {
            list-style: none;
            padding: 0;
        }
        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            background: #f4f4f4;
            border-radius: 5px;
        }
        .task.completed {
            text-decoration: line-through;
            color: #999;
        }
        .notes textarea {
            height: 100px;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- TODOリスト -->
    <div class="todo-list">
        <h3>TODOリスト</h3>
        <input type="text" id="new-task" placeholder="新しいタスクを入力">
        <button onclick="addTask()">追加</button>
        <ul class="task-list" id="task-list"></ul>
    </div>

    <!-- メモ機能 -->
    <div class="notes">
        <h3>メモ</h3>
        <textarea id="notes" placeholder="メモを入力..."></textarea>
        <button onclick="saveNotes()">保存</button>
    </div>
</div>

<script>
    // TODOリスト機能
    function addTask() {
        const taskInput = document.getElementById("new-task");
        const taskText = taskInput.value.trim();
        if (taskText) {
            const taskList = document.getElementById("task-list");
            const taskItem = document.createElement("li");
            taskItem.className = "task";
            taskItem.innerHTML = `<span>${taskText}</span> <button onclick="removeTask(this)">削除</button>`;
            taskItem.onclick = () => taskItem.classList.toggle("completed");
            taskList.appendChild(taskItem);
            taskInput.value = "";
        }
    }

    function removeTask(button) {
        button.parentElement.remove();
    }

    // メモ保存機能
    function saveNotes() {
        const notes = document.getElementById("notes").value;
        localStorage.setItem("notes", notes);
        alert("メモが保存されました！");
    }

    // ページ読み込み時にメモを復元
    window.onload = function() {
        document.getElementById("notes").value = localStorage.getItem("notes") || "";
    }
</script>

</body>
</html>
