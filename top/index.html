<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container {
            padding: 20px;
        }
        .date-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            font-size: 20px;
            color: #333;
        }
        .date-time .date {
            font-size: 18px;
            margin-bottom: 5px;
        }
        .date-time .time {
            font-size: 32px;
            font-weight: bold;
        }
        .calendar-embed {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 600px;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 日付と時刻の表示 -->
    <div class="date-time">
        <div class="date" id="current-date"></div>
        <div class="time" id="current-time"></div>
    </div>

    <!-- Googleカレンダーの埋め込み -->
    <div class="calendar-embed">
        <iframe src="https://calendar.google.com/calendar/embed?src=ja.japanese%23holiday%40group.v.calendar.google.com&ctz=Asia%2FTokyo" 
                frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<script>
    // 現在の日時を表示する関数
    function updateDateTime() {
        const now = new Date();
        
        // 日付の表示
        const days = ["日", "月", "火", "水", "木", "金", "土"];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const day = days[now.getDay()];
        document.getElementById("current-date").textContent = `${year}年${month}月${date}日 (${day})`;

        // 時刻の表示
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById("current-time").textContent = `${hours}:${minutes}:${seconds}`;
    }

    // 1秒ごとにupdateDateTime関数を呼び出す
    setInterval(updateDateTime, 1000);
    updateDateTime(); // ページ読み込み時に一度だけ実行
</script>

</body>
</html>
