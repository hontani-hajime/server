        body {
            background-color: #f5f5f5;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* コンテナのスタイル */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr; /* Box 3が広くなるように設定 */
            grid-template-rows: 1fr 2fr; /* 上段1fr、下段2frの高さ */
            gap: 10px;
            padding: 5px; /* 画面の端に少しだけ余白 */
            height: 98vh; /* コンテナをほぼ全画面に */
            box-sizing: border-box;
        }

        /* 各四角形のスタイル */
        .box {
            background-color: #ffffff;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
