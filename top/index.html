<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物紹介ページ</title>
    <style>
        /* 人物紹介のスタイル */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .profile {
            width: 50%;
            background-color: #f4f4f4;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .profile h2 {
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>人物紹介ページ</h1>
</header>

<div class="profile">
    <h2>田中 太郎</h2>
    <p>田中 太郎は、1985年生まれのエンジニアで、...</p>
    <!-- 他の人物のプロフィールも追加可能 -->
</div>

</body>
</html>
