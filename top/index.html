<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トップページ</title>
    <style>
        /* スタイル設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background-color: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-content {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .top-section {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .datetime, .memo {
            padding: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ddd;
            width: 45%;
            margin: 10px;
            text-align: center;
        }
        .datetime h2, .memo h2 {
            margin-bottom: 10px;
        }
        iframe {
            border: none;
        }
        .calendar, .todo-list {
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            margin: 10px;
        }
    </style>
    <script>
        // 現在の日時をリアルタイムで表示
        function updateDateTime() {
            const dateTimeElement = document.getElementById("datetime");
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            dateTimeElement.textContent = now.toLocaleDateString('ja-JP', options);
        }
        setInterval(updateDateTime, 1000);
    </script>
</head>
<body>

<header>
    <h1>トップページ</h1>
</header>

<div class="main-content">

    <div class="top-section">
        <div class="datetime" id="datetime-container">
            <h2>現在の日時</h2>
            <p id="datetime"></p>
