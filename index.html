<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="共通サーバー">
  <link rel="apple-touch-icon" href="https://hontani-hajime.github.io/server/server-logo.JPG">
  <link rel="icon" href="https://hontani-hajime.github.io/server/server-logo.JPG" type="image/jpeg">
  <title>共通サーバー</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0; /* 左右の余白を削除 */
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      height: 70px; /* ヘッダーの高さを指定 */
    }
    header .logo {
      display: flex;
      align-items: center;
      margin-left: 0; /* 左端に寄せる */
    }
    header .logo img {
      height: 70px; /* ヘッダーの高さと揃える */
      width: auto; /* 画像の形を保つ */
    }
    header .search {
      display: flex;
      align-items: center;
      margin-right: 10px;
    }
    header .search input[type="text"] {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-right: 5px;
      width: 180px;
    }
    header .search button {
      padding: 5px 10px;
      font-size: 14px;
      color: #fff;
      background-color: #003366;
      border: 1px solid #003366;
      border-radius: 3px;
      cursor: pointer;
    }
    header .search button:hover {
      background-color: #002244;
    }
    main {
      margin-top: 70px;
      display: flex;
      height: calc(100vh - 70px); /* ヘッダーを除いた高さ */
    }
    .sidebar {
      flex: 1; /* 左側を1とする */
      border-right: 1px solid #ddd; /* 境界線 */
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
    }
    .content {
      flex: 6; /* 右側を6とする */
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://hontani-hajime.github.io/server/icon.JPG" alt="新しいロゴ">
    </div>
    <div class="search">
      <input type="text" placeholder="検索...">
      <button>検索</button>
    </div>
  </header>
  <main>
    <div class="sidebar">
      <!-- 左側のコンテンツをここに追加 -->
    </div>
    <div class="content">
      <!-- 右側のコンテンツをここに追加 -->
    </div>
  </main>
</body>
</html>
