<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="共通サーバー">
  <link rel="apple-touch-icon" href="https://hontani-hajime.github.io/server/server-logo.JPG">
  <link rel="icon" href="https://hontani-hajime.github.io/server/server-logo.JPG" type="image/jpeg">
  <title>共通サーバー</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      height: 70px;
    }
    header .logo {
      display: flex;
      align-items: center;
      margin-left: 0;
    }
    header .logo img {
      height: 70px;
      width: auto;
    }
    header .search {
      display: flex;
      align-items: center;
      margin-right: 10px;
    }
    header .search input[type="text"] {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-right: 5px;
      width: 180px;
    }
    header .search button {
      padding: 5px 10px;
      font-size: 14px;
      color: #fff;
      background-color: #003366;
      border: 1px solid #003366;
      border-radius: 3px;
      cursor: pointer;
    }
    header .search button:hover {
      background-color: #002244;
    }
    main {
      margin-top: 70px;
      display: flex;
      height: calc(100vh - 70px);
    }
    .sidebar {
      flex: 1;
      border-right: 1px solid #ddd;
      background-color: #f5f5f5;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .content {
      flex: 6;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
  <script>
    function toggleImage(imageElement, newSrc, delay = 200) {
      const originalSrc = imageElement.src; // 現在の画像URLを保存
      imageElement.src = newSrc; // 一瞬別の画像に変更
      setTimeout(() => {
        imageElement.src = originalSrc; // 元の画像に戻す
      }, delay);
    }

    function showContent(url, elementId) {
      const contentElement = document.getElementById('content');
      if (elementId === 'calendar') {
        contentElement.innerHTML = `<iframe src="${url}" frameborder="0"></iframe>`;
      } else {
        contentElement.innerHTML = '';
      }
    }
  </script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://hontani-hajime.github.io/server/icon.JPG" alt="新しいロゴ">
    </div>
    <div class="search">
      <input type="text" placeholder="検索...">
      <button>検索</button>
    </div>
  </header>
  <main>
    <div class="sidebar">
      <img src="https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC.JPG" 
           alt="カレンダー" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC2.JPG'); showContent('https://hontani-hajime.github.io/server/calendar', 'calendar')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%95%E3%82%9A.JPG" 
           alt="トップ" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%95%E3%82%9A2.JPG'); showContent('', 'top')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB.JPG" 
           alt="ファイル" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB2.JPG'); showContent('', 'file')">
      <!-- 他の画像も同様に設定 -->
    </div>
    <div class="content" id="content">
      <!-- コンテンツエリア -->
    </div>
  </main>
</body>
</html>
