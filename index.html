<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="共通サーバー">
  <link rel="apple-touch-icon" href="https://hontani-hajime.github.io/server/server-logo.JPG">
  <link rel="icon" href="https://hontani-hajime.github.io/server/server-logo.JPG" type="image/jpeg">
  <title>共通サーバー</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      height: 70px;
    }
    header .logo {
      display: flex;
      align-items: center;
      margin-left: 0;
    }
    header .logo img {
      height: 70px;
      width: auto;
    }
    header .search {
      display: flex;
      align-items: center;
      margin-right: 10px;
    }
    header .search input[type="text"] {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-right: 5px;
      width: 180px;
    }
    header .search button {
      padding: 5px 10px;
      font-size: 14px;
      color: #fff;
      background-color: #003366;
      border: 1px solid #003366;
      border-radius: 3px;
      cursor: pointer;
    }
    header .search button:hover {
      background-color: #002244;
    }
    main {
      margin-top: 70px;
      display: flex;
      height: calc(100vh - 70px);
    }
    .sidebar {
      flex: 1;
      border-right: 1px solid #ddd;
      background-color: #f5f5f5;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .content {
      flex: 6;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://hontani-hajime.github.io/server/icon.JPG" alt="新しいロゴ">
    </div>
    <div class="search">
      <input type="text" placeholder="検索...">
      <button>検索</button>
    </div>
  </header>
  <main>
    <div class="sidebar">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%97.JPG" alt="トップ" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/ファイル.JPG" alt="ファイル" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/日記.JPG" alt="日記" class="clickable">
      <img id="calendar-img" 
           src="https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC.JPG" 
           alt="カレンダー" 
           class="clickable">
      <img id="database-img" 
           src="https://hontani-hajime.github.io/server/header/%E3%83%86%E3%82%99%E3%83%BC%E3%82%BF%E3%83%98%E3%82%99%E3%83%BC%E3%82%B9.JPG" 
           alt="データベース" 
           class="clickable">
      <img id="password-img" 
           src="https://hontani-hajime.github.io/server/header/%E3%83%8F%E3%82%9A%E3%82%B9%E3%83%AF%E3%83%BC%E3%83%88%E3%82%99.JPG" 
           alt="パスワード" 
           class="clickable">
    </div>
    <div class="content">
      <!-- 右側のコンテンツをここに追加 -->
    </div>
  </main>
  <audio id="click-sound" src="https://hontani-hajime.github.io/server/mouse.mp3"></audio>
  <script>
    const calendarImg = document.getElementById("calendar-img");
    const databaseImg = document.getElementById("database-img");
    const passwordImg = document.getElementById("password-img");

    const originalImages = {
      "calendar": calendarImg.src,
      "database": databaseImg.src,
      "password": passwordImg.src,
    };

    const newImages = {
      "calendar": "https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC2.JPG",
      "database": "https://hontani-hajime.github.io/server/header/%E3%83%86%E3%82%99%E3%83%BC%E3%82%BF%E3%83%98%E3%82%99%E3%83%BC%E3%82%B92.JPG",
      "password": "https://hontani-hajime.github.io/server/header/%E3%83%8F%E3%82%9A%E3%82%B9%E3%83%AF%E3%83%BC%E3%83%88%E3%82%992.JPG",
    };

    document.querySelectorAll('.sidebar img').forEach(img => {
      img.addEventListener('click', () => {
        // 全ての画像を元に戻す
        calendarImg.src = originalImages["calendar"];
        databaseImg.src = originalImages["database"];
        passwordImg.src = originalImages["password"];
        
        // クリックされた画像だけ変更
        if (img === calendarImg) {
          calendarImg.src = newImages["calendar"];
        } else if (img === databaseImg) {
          databaseImg.src = newImages["database"];
        } else if (img === passwordImg) {
          passwordImg.src = newImages["password"];
        }

        const audio = document.getElementById('click-sound');
        audio.currentTime = 0; // 再生位置をリセット
        audio.play();
      });
    });
  </script>
</body>
</html>
