<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="共通サーバー">
  <link rel="apple-touch-icon" href="https://hontani-hajime.github.io/server/server-logo.JPG">
  <link rel="icon" href="https://hontani-hajime.github.io/server/server-logo.JPG" type="image/jpeg">
  <title>共通サーバー</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      height: 70px;
    }
    header .logo {
      display: flex;
      align-items: center;
      margin-left: 0;
    }
    header .logo img {
      height: 70px;
      width: auto;
    }
    header .search {
      display: flex;
      align-items: center;
      margin-right: 10px;
    }
    header .search input[type="text"] {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-right: 5px;
      width: 180px;
    }
    header .search button {
      padding: 5px 10px;
      font-size: 14px;
      color: #fff;
      background-color: #003366;
      border: 1px solid #003366;
      border-radius: 3px;
      cursor: pointer;
    }
    header .search button:hover {
      background-color: #002244;
    }
    main {
      margin-top: 70px;
      display: flex;
      height: calc(100vh - 70px);
    }
    .sidebar {
      flex: 1;
      border-right: 1px solid #ddd;
      background-color: #f5f5f5;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .content {
      flex: 6;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://hontani-hajime.github.io/server/icon.JPG" alt="新しいロゴ">
    </div>
    <div class="search">
      <input type="text" placeholder="検索...">
      <button>検索</button>
    </div>
  </header>
  <main>
    <div class="sidebar">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%95%E3%82%9A.JPG" alt="トップ" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/ファイル.JPG" alt="ファイル" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/日記.JPG" alt="日記" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC.JPG" alt="カレンダー" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/データベース.JPG" alt="データベース" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/自分追跡.JPG" alt="自分追跡" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/学習記録表.JPG" alt="学習記録表" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/音楽.JPG" alt="音楽" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/パスワード.JPG" alt="パスワード" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/読書通帳.JPG" alt="読書通帳" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/予算管理.JPG" alt="予算管理" class="clickable">
      <img src="https://hontani-hajime.github.io/server/header/リバースプラン.JPG" alt="リバースプラン" class="clickable">
    </div>
    <div class="content">
      <!-- 右側のコンテンツをここに追加 -->
    </div>
  </main>
  <audio id="click-sound" src="https://hontani-hajime.github.io/server/mouse.mp3"></audio>
  <script>
    document.querySelectorAll('.sidebar img').forEach(img => {
      img.addEventListener('click', () => {
        const audio = document.getElementById('click-sound');
        audio.currentTime = 0; // 再生位置をリセット
        audio.play();
      });
    });
  </script>
</body>
</html>
