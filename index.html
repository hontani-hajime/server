<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>はじめサーバー</title>
    <link rel="icon" href="https://hontani-hajime.github.io/server/logo.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        /* ヘッダースタイル */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
        }
        /* ハンバーガーメニュースタイル */
        .menu-icon {
            font-size: 24px;
            cursor: pointer;
            margin-right: 20px;
        }
        .menu {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px;
            left: 10px;
            background-color: #333;
            padding: 10px;
            border-radius: 5px;
        }
        .menu a {
            color: white;
            text-decoration: none;
            margin: 5px 0;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        /* サイトタイトル */
        .site-title {
            font-size: 24px;
            margin: 0;
        }
        /* 検索ボックス */
        .search-box {
            display: flex;
            align-items: center;
        }
        .search-box input[type="text"] {
            padding: 5px;
            border: none;
            border-radius: 3px;
            margin-right: 5px;
        }
        .search-box button {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            background-color: #1abc9c;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <!-- ハンバーガーメニューアイコン -->
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>

    <!-- サイトタイトル -->
    <h1 class="site-title">はじめサーバー</h1>

    <!-- 検索ボックス -->
    <div class="search-box">
        <input type="text" placeholder="検索...">
        <button>検索</button>
    </div>

    <!-- メニュー -->
    <nav class="menu" id="menu">
        <a href="#">トップ</a>
        <a href="#" target="_blank">学習予定表</a>
        <a href="#" target="_blank">学習記録表</a>
        <a href="#" target="_blank">算盤練習記録</a>
        <a href="#" target="_blank">ピアノ練習記録</a>
        <a href="#" target="_blank">共有フォルダ</a>
        <a href="#">各種リンク</a>
    </nav>
</header>

<script>
    // メニューの表示・非表示を切り替える関数
    function toggleMenu() {
        const menu = document.getElementById("menu");
        if (menu.style.display === "flex") {
            menu.style.display = "none";
        } else {
            menu.style.display = "flex";
        }
    }
</script>

</body>
</html>
