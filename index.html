<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="共通サーバー">
  <link rel="apple-touch-icon" href="https://hontani-hajime.github.io/server/server-logo.JPG">
  <link rel="icon" href="https://hontani-hajime.github.io/server/server-logo.JPG" type="image/jpeg">
  <title>共通サーバー</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      height: 70px;
    }
    header .logo {
      display: flex;
      align-items: center;
      margin-left: 0;
    }
    header .logo img {
      height: 70px;
      width: auto;
    }
    header .search {
      display: flex;
      align-items: center;
      margin-right: 10px;
    }
    header .search input[type="text"] {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-right: 5px;
      width: 180px;
    }
    header .search button {
      padding: 5px 10px;
      font-size: 14px;
      color: #fff;
      background-color: #003366;
      border: 1px solid #003366;
      border-radius: 3px;
      cursor: pointer;
    }
    header .search button:hover {
      background-color: #002244;
    }
    main {
      margin-top: 70px;
      display: flex;
      height: calc(100vh - 70px);
    }
    .sidebar {
      flex: 1;
      border-right: 1px solid #ddd;
      background-color: #f5f5f5;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .content {
      flex: 6;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
    }
  </style>
  <script>
    function toggleImage(imageElement, newSrc, delay = 200) {
      const originalSrc = imageElement.src; // 現在の画像URLを保存
      imageElement.src = newSrc; // 一瞬別の画像に変更
      setTimeout(() => {
        imageElement.src = originalSrc; // 元の画像に戻す
      }, delay);
    }
  </script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://hontani-hajime.github.io/server/icon.JPG" alt="新しいロゴ">
    </div>
    <div class="search">
      <input type="text" placeholder="検索...">
      <button>検索</button>
    </div>
  </header>
  <main>
    <div class="sidebar">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%95%E3%82%9A.JPG" 
           alt="トップ" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%88%E3%83%83%E3%83%95%E3%82%9A2.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB.JPG" 
           alt="ファイル" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB2.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E6%97%A5%E8%A8%98.JPG" 
           alt="日記" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E6%97%A5%E8%A8%982.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC.JPG" 
           alt="カレンダー" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%82%AB%E3%83%AC%E3%83%B3%E3%82%BF%E3%82%99%E3%83%BC2.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%86%E3%82%99%E3%83%BC%E3%82%BF%E3%83%98%E3%82%99%E3%83%BC%E3%82%B9.JPG" 
           alt="データベース" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%86%E3%82%99%E3%83%BC%E3%82%BF%E3%83%98%E3%82%99%E3%83%BC%E3%82%B92.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E8%87%AA%E5%88%86%E8%BF%BD%E8%B7%A1.JPG" 
           alt="自分追跡" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E8%87%AA%E5%88%86%E8%BF%BD%E8%B7%A12.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E5%AD%A6%E7%BF%92%E8%A8%98%E9%8C%B2%E8%A1%A8.JPG" 
           alt="学習記録表" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E5%AD%A6%E7%BF%92%E8%A8%98%E9%8C%B2%E8%A1%A82.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E9%9F%B3%E6%A5%BD.JPG" 
           alt="音楽" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E9%9F%B3%E6%A5%BD2.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%8F%E3%82%9A%E3%82%B9%E3%83%AF%E3%83%BC%E3%83%88%E3%82%99.JPG" 
           alt="パスワード" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%8F%E3%82%9A%E3%82%B9%E3%83%AF%E3%83%BC%E3%83%88%E3%82%992.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E8%AA%AD%E6%9B%B8%E9%80%9A%E5%B8%B3.JPG" 
           alt="読書通帳" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E8%AA%AD%E6%9B%B8%E9%80%9A%E5%B8%B32.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E4%BA%88%E7%AE%97%E7%AE%A1%E7%90%86.JPG" 
           alt="予算管理" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E4%BA%88%E7%AE%97%E7%AE%A1%E7%90%862.JPG')">
      <img src="https://hontani-hajime.github.io/server/header/%E3%83%AA%E3%83%8F%E3%82%99%E3%83%BC%E3%82%B9%E3%83%95%E3%82%9A%E3%83%A9%E3%83%B3.JPG" 
           alt="リバースプラン" 
           onclick="toggleImage(this, 'https://hontani-hajime.github.io/server/header/%E3%83%AA%E3%83%8F%E3%82%99%E3%83%BC%E3%82%B9%E3%83%95%E3%82%9A%E3%83%A9%E3%83%B32.JPG')">
    </div>
    <div class="content">
      <!-- 右側のコンテンツをここに追加 -->
    </div>
  </main>
</body>
</html>
