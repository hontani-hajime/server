<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物詳細ページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }
        .container {
            display: flex;
            max-width: 900px;
            margin: auto;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .left-column {
            width: 30%;
            text-align: center;
        }
        .left-column img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        .left-column .info {
            text-align: left;
            margin-top: 10px;
        }
        .left-column .info p {
            margin: 5px 0;
        }
        .right-column {
            width: 70%;
            margin-left: 20px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h2 {
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 1.5em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-column">
        <img src="portrait.jpg" alt="人物肖像">
        <div class="info">
            <p><strong>氏名:</strong> 山田 太郎</p>
            <p><strong>ふりがな:</strong> やまだ たろう</p>
            <p><strong>生年月日:</strong> 1990年1月1日</p>
            <p><strong>性別:</strong> 男性</p>
            <p><strong>個体番号:</strong> 123456789</p>
        </div>
    </div>

    <div class="right-column">
        <div class="section">
            <h2>概要</h2>
            <p>ここに概要の内容を記入します。人物の簡単な紹介や役割などが入ります。</p>
        </div>
        <div class="section">
            <h2>来歴</h2>
            <p>ここに来歴の内容を記入します。経歴や重要な出来事などが記載されます。</p>
        </div>
        <div class="section">
            <h2>詳細</h2>
            <p>ここに詳細の内容を記入します。さらに深い情報や特筆すべき事柄が含まれます。</p>
        </div>
    </div>
</div>

</body>
</html>
