<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物詳細ページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .left-column {
            width: 30%;
            text-align: center;
        }
        .left-column img {
            width: 80%;
            height: auto;
            max-width: 250px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        .left-column .info {
            text-align: left;
            margin-top: 10px;
            padding-left: 10%;
        }
        .left-column .info p {
            margin: 5px 0;
        }
        .right-column {
            width: 70%;
            margin-left: 20px;
        }
        .section {
            margin-bottom: 20px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .section h2 {
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 1.5em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-column">
        <img src="portrait.jpg" alt="人物肖像">
        <div class="info">
            <p><strong>氏　　名:</strong> 山田 太郎</p>
            <p><strong>ふりがな:</strong> やまだ たろう</p>
            <p><strong>生年月日:</strong> 1990年1月1日</p>
            <p><strong>性　　別:</strong> 男性</p>
            <p><strong>個体番号:</strong> 123456789</p>
            <p><strong>関係期間:</strong> 中学/高校</p>
        </div>
    </div>

    <div class="right-column">
        <div class="section">
            <h2>概要</h2>
            <p>ここに概要の内容を記入します。文章が端に達した場合、自動で折り返されますので、長文でも見やすく表示されます。</p>
        </div>
        <div class="section">
            <h2>来歴</h2>
            <p>ここに来歴の内容を記入します。経歴や重要な出来事などが記載され、文章が端に達した際には改行されます。</p>
        </div>
        <div class="section">
            <h2>詳細</h2>
            <p>ここに詳細の内容を記入します。さらに深い情報や特筆すべき事柄が含まれます。文章の長さを気にせず入力できます。</p>
        </div>
    </div>
</div>

</body>
</html>
